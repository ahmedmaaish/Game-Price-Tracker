<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game Price Tracker — live PC game deals</title>
<meta name="description" content="Live price tracker for PC games — current deals, discounts and price history across Steam, GOG, Humble and more.">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{
  --bg:#0a0b10; --card:#151824; --line:#272c3d; --text:#eef0f7;
  --muted:#8b93a9; --accent:#4ade80; --hot:#ff7a45; --gold:#ffce54;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:var(--bg); color:var(--text); overflow-x:hidden;
}

/* ambient animated background */
.bg{position:fixed;inset:0;z-index:-1;overflow:hidden;}
.blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:.28;}
.blob.a{width:540px;height:540px;background:#4ade80;top:-160px;left:-120px;
  animation:drift1 24s ease-in-out infinite alternate;}
.blob.b{width:520px;height:520px;background:#7c5cff;bottom:-180px;right:-140px;
  animation:drift2 28s ease-in-out infinite alternate;}
.blob.c{width:400px;height:400px;background:#3b82f6;top:35%;left:58%;
  animation:drift1 32s ease-in-out infinite alternate;}
@keyframes drift1{to{transform:translate(90px,70px) scale(1.18);}}
@keyframes drift2{to{transform:translate(-80px,-60px) scale(1.12);}}

/* hero */
.hero{text-align:center;padding:60px 20px 26px;}
.hero h1{
  margin:0;font-size:clamp(2rem,5.5vw,3.4rem);font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(115deg,#ffffff,#4ade80 55%,#7c5cff);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.tagline{margin:12px 0 0;color:var(--muted);font-size:.95rem;}
.live{display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 10px var(--accent);
  margin-right:7px;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:24px;}
.stat{background:rgba(255,255,255,.045);border:1px solid var(--line);
  border-radius:14px;padding:12px 22px;min-width:124px;backdrop-filter:blur(8px);}
.stat .num{font-size:1.55rem;font-weight:800;line-height:1.1;}
.stat .num.green{color:var(--accent);}
.stat .lbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;
  letter-spacing:.6px;margin-top:3px;}

/* toolbar */
.toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  margin:14px auto 26px;padding:0 20px;}
.sort{background:rgba(255,255,255,.045);border:1px solid var(--line);
  color:var(--muted);padding:8px 16px;border-radius:999px;cursor:pointer;
  font-size:.84rem;font-family:inherit;transition:.15s;}
.sort:hover{color:var(--text);border-color:var(--muted);}
.sort.on{background:var(--accent);color:#06210f;border-color:var(--accent);font-weight:700;}

/* grid + cards */
.grid{display:grid;gap:18px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  max-width:1200px;margin:0 auto;padding:0 20px 70px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  overflow:hidden;cursor:pointer;position:relative;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  opacity:0;transform:translateY(18px);animation:rise .5s ease forwards;}
@keyframes rise{to{opacity:1;transform:none;}}
.card:hover{transform:translateY(-6px);border-color:var(--accent);
  box-shadow:0 18px 44px -14px rgba(74,222,128,.4);}
.art{position:relative;aspect-ratio:460/215;background:#0d0f17;overflow:hidden;}
.art img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.card:hover .art img{transform:scale(1.07);}
.art::after{content:"";position:absolute;inset:0;
  background:linear-gradient(to top,var(--card),transparent 42%);}
.badge{position:absolute;font-weight:800;font-size:.78rem;padding:5px 9px;
  border-radius:8px;z-index:2;}
.badge.disc{top:10px;right:10px;
  background:linear-gradient(135deg,#4ade80,#16a34a);color:#06210f;}
.badge.disc.hot{background:linear-gradient(135deg,#ff9a3c,#ff3d3d);color:#fff;
  box-shadow:0 0 18px rgba(255,80,60,.6);}
.badge.low{top:10px;left:10px;
  background:linear-gradient(135deg,#ffd968,#ffae00);color:#3a2900;
  box-shadow:0 0 16px rgba(255,200,70,.6);}
.body{padding:14px 16px 16px;}
.title{margin:0 0 10px;font-size:1.02rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prices{display:flex;align-items:baseline;gap:9px;}
.now{font-size:1.7rem;font-weight:800;color:var(--accent);line-height:1;}
.was{color:var(--muted);text-decoration:line-through;font-size:.92rem;}
.meta{display:flex;justify-content:space-between;margin-top:8px;
  font-size:.76rem;color:var(--muted);}
.spark{display:block;width:100%;height:34px;margin-top:10px;}
.buy{display:block;margin-top:12px;text-align:center;padding:10px;
  background:var(--accent);color:#06210f;font-weight:800;font-size:.9rem;
  border-radius:10px;text-decoration:none;transition:.15s;}
.buy:hover{box-shadow:0 0 20px rgba(74,222,128,.6);}
.buy.none{background:rgba(255,255,255,.06);color:var(--muted);pointer-events:none;}
.empty{text-align:center;color:var(--muted);padding:80px 20px;}
footer{text-align:center;color:#5b6175;font-size:.8rem;padding:30px 20px 40px;}
footer a{color:var(--muted);}

/* modal */
dialog{background:var(--card);color:var(--text);border:1px solid var(--line);
  border-radius:18px;padding:0;width:min(620px,93vw);}
dialog::backdrop{background:rgba(5,6,10,.78);}
.m-head{display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;border-bottom:1px solid var(--line);}
.m-head h2{margin:0;font-size:1.12rem;}
.m-close{background:none;border:none;color:var(--muted);font-size:1.5rem;
  cursor:pointer;line-height:1;}
.m-body{padding:20px;}
.m-price{display:flex;align-items:baseline;gap:10px;}
.m-now{font-size:1.8rem;font-weight:800;color:var(--accent);}
.m-was{color:var(--muted);text-decoration:line-through;}
.m-sub{color:var(--muted);font-size:.85rem;margin:4px 0 14px;}
.chart-wrap{position:relative;height:220px;}
.m-note{color:var(--muted);font-size:.82rem;text-align:center;margin:12px 0 0;}
.m-buy{display:block;margin-top:16px;text-align:center;padding:12px;
  background:var(--accent);color:#06210f;font-weight:800;border-radius:11px;
  text-decoration:none;}
</style>
</head>
<body>
<div class="bg"><div class="blob a"></div><div class="blob b"></div><div class="blob c"></div></div>

<header class="hero">
  <h1>Game Price Tracker</h1>
  <p class="tagline" id="tagline"><span class="live"></span>Loading latest prices&hellip;</p>
  <div class="stats" id="stats"></div>
</header>

<main>
  <div class="toolbar" id="toolbar">
    <button class="sort on" data-sort="discount">Biggest discount</button>
    <button class="sort" data-sort="price">Lowest price</button>
    <button class="sort" data-sort="name">Name</button>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>Prices via the <a href="https://www.cheapshark.com" target="_blank" rel="noopener">CheapShark</a> API &mdash; updated daily by GitHub Actions.</footer>

<dialog id="modal">
  <div class="m-head">
    <h2 id="m-title"></h2>
    <button class="m-close" id="m-close" aria-label="Close">&times;</button>
  </div>
  <div class="m-body">
    <div class="m-price">
      <span class="m-now" id="m-now"></span>
      <span class="m-was" id="m-was"></span>
    </div>
    <p class="m-sub" id="m-sub"></p>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <p class="m-note" id="m-note"></p>
    <a class="m-buy" id="m-buy" target="_blank" rel="noopener">View Deal &rarr;</a>
  </div>
</dialog>

<script>
// To earn affiliate commission, replace this with your own store affiliate
// links once you've joined the store programs (Fanatical, GMG, Humble, etc.).
const REDIRECT = "https://www.cheapshark.com/redirect?dealID=";
let DATA = null, stores = {}, chart = null, sortMode = "discount";

const money = n => (n == null ? "—" : "$" + Number(n).toFixed(2));
const esc = s => String(s).replace(/[&<>"]/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const artURL = g => g.steam_app_id
  ? `https://cdn.cloudflare.steamstatic.com/steam/apps/${g.steam_app_id}/header.jpg`
  : (g.thumb || "");

function discount(g){
  const c = g.current;
  if(!c || !c.retail || c.retail <= c.price) return 0;
  return Math.round((1 - c.price / c.retail) * 100);
}
function isLowest(g){
  const c = g.current;
  return !!c && g.cheapest_ever != null && c.price <= g.cheapest_ever + 0.01;
}

function sparkline(history){
  const pts = (history || []).slice(-30);
  if(pts.length < 3) return "";
  const v = pts.map(p => p.price);
  const lo = Math.min(...v), hi = Math.max(...v), range = hi - lo || 1;
  const W = 100, H = 34;
  const d = pts.map((p,i) => {
    const x = (i / (pts.length - 1)) * W;
    const y = H - 4 - ((p.price - lo) / range) * (H - 8);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const col = v[v.length-1] <= v[0] ? "#4ade80" : "#ff7a45";
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${d}" fill="none" stroke="${col}" stroke-width="2.4"
      stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function makeCard(g, i){
  const c = g.current, disc = discount(g), low = isLowest(g);
  const el = document.createElement("article");
  el.className = "card";
  el.style.animationDelay = (i * 55) + "ms";
  const badges =
    (disc > 0 ? `<span class="badge disc ${disc>=50?"hot":""}">−${disc}%</span>` : "") +
    (low ? `<span class="badge low">★ LOWEST EVER</span>` : "");
  const buy = (c && c.deal_id)
    ? `<a class="buy" href="${REDIRECT}${c.deal_id}" target="_blank" rel="noopener"
         onclick="event.stopPropagation()">View Deal &rarr;</a>`
    : `<span class="buy none">No deal right now</span>`;
  el.innerHTML = `
    <div class="art">
      ${badges}
      <img src="${artURL(g)}" alt="" loading="lazy"
        onerror="this.onerror=null;this.src='${g.thumb || ""}'">
    </div>
    <div class="body">
      <h3 class="title" title="${esc(g.title)}">${esc(g.title)}</h3>
      <div class="prices">
        <span class="now">${money(c && c.price)}</span>
        ${c && c.retail && c.retail > c.price ? `<span class="was">${money(c.retail)}</span>` : ""}
      </div>
      <div class="meta">
        <span>${c ? esc(stores[c.store_id] || "store") : "—"}</span>
        <span>all-time low ${money(g.cheapest_ever)}</span>
      </div>
      ${sparkline(g.history)}
      ${buy}
    </div>`;
  el.addEventListener("click", () => openModal(g));
  return el;
}

function sortGames(list){
  const a = [...list];
  if(sortMode === "discount") a.sort((x,y) => discount(y) - discount(x));
  else if(sortMode === "price")
    a.sort((x,y) => ((x.current && x.current.price) ?? 1e9) - ((y.current && y.current.price) ?? 1e9));
  else a.sort((x,y) => x.title.toLowerCase().localeCompare(y.title.toLowerCase()));
  return a;
}

function render(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const games = DATA.games || [];
  if(!games.length){
    grid.innerHTML = '<p class="empty">No games tracked yet &mdash; add titles to watchlist.json.</p>';
    return;
  }
  sortGames(games).forEach((g,i) => grid.appendChild(makeCard(g,i)));
}

function fillStats(){
  const games = DATA.games || [];
  const best = games.length ? Math.max(0, ...games.map(discount)) : 0;
  const onSale = games.filter(g => discount(g) > 0).length;
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="num">${games.length}</div><div class="lbl">Games tracked</div></div>
    <div class="stat"><div class="num green">−${best}%</div><div class="lbl">Biggest discount</div></div>
    <div class="stat"><div class="num">${onSale}</div><div class="lbl">On sale now</div></div>`;
  const when = DATA.updated_at ? new Date(DATA.updated_at).toLocaleString() : "—";
  document.getElementById("tagline").innerHTML =
    `<span class="live"></span>Live PC game deals &mdash; last updated ${when}`;
}

function openModal(g){
  const c = g.current;
  document.getElementById("m-title").textContent = g.title;
  document.getElementById("m-now").textContent = money(c && c.price);
  document.getElementById("m-was").textContent =
    (c && c.retail && c.retail > c.price) ? money(c.retail) : "";
  const disc = discount(g);
  document.getElementById("m-sub").textContent =
    (c ? ((disc > 0 ? disc + "% off · " : "") + (stores[c.store_id] || "store") + " · ") : "") +
    "all-time low " + money(g.cheapest_ever);
  const buy = document.getElementById("m-buy");
  if(c && c.deal_id){ buy.href = REDIRECT + c.deal_id; buy.style.display = "block"; }
  else { buy.style.display = "none"; }
  const hist = g.history || [];
  document.getElementById("m-note").textContent =
    hist.length < 2 ? "Price history starts building today — it fills in as the tracker runs each day." : "";

  document.getElementById("modal").showModal();

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type:"line",
    data:{ labels:hist.map(h => h.date),
      datasets:[{ data:hist.map(h => h.price), borderColor:"#4ade80",
        backgroundColor:"rgba(74,222,128,.14)", fill:true, stepped:true,
        borderWidth:2.5, pointRadius:3, pointBackgroundColor:"#4ade80" }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        x:{ grid:{color:"#272c3d"}, ticks:{color:"#8b93a9",maxTicksLimit:8} },
        y:{ grid:{color:"#272c3d"}, ticks:{color:"#8b93a9",callback:v => "$"+v} }
      } }
  });
}

document.getElementById("m-close").onclick = () =>
  document.getElementById("modal").close();
document.getElementById("modal").addEventListener("click", e => {
  if(e.target.id === "modal") e.target.close();
});
document.getElementById("toolbar").addEventListener("click", e => {
  const b = e.target.closest(".sort");
  if(!b) return;
  document.querySelectorAll(".sort").forEach(s => s.classList.remove("on"));
  b.classList.add("on");
  sortMode = b.dataset.sort;
  render();
});

fetch("data.json?" + Date.now())
  .then(r => r.json())
  .then(d => { DATA = d; stores = d.stores || {}; fillStats(); render(); })
  .catch(() => {
    document.getElementById("tagline").textContent = "Could not load price data.";
  });
</script>
</body>
</html>
